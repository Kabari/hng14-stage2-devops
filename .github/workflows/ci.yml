name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  REGISTRY: localhost:5000

jobs:
  # ────────────────────────────────────────────────────
  # 1. LINT
  # ────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python – API
        run: flake8 api/main.py --max-line-length=100

      - name: Lint Python – Worker
        run: flake8 worker/worker.py --max-line-length=100

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps (with dev)
        working-directory: frontend
        run: npm install

      - name: Lint JavaScript
        working-directory: frontend
        run: npm run lint

      - name: Install hadolint
        run: |
          curl -sSL https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64 \
            -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles
        run: |
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile

  # ────────────────────────────────────────────────────
  # 2. TEST
  # ────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API deps + test tools
        run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run pytest with coverage
        working-directory: api
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  # ────────────────────────────────────────────────────
  # 3. BUILD
  # ────────────────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set SHA output
        id: meta
        run: echo "sha=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Build api image
        run: |
          docker build -t $REGISTRY/api:${{ steps.meta.outputs.sha }} \
                       -t $REGISTRY/api:latest \
                       ./api

      - name: Build worker image
        run: |
          docker build -t $REGISTRY/worker:${{ steps.meta.outputs.sha }} \
                       -t $REGISTRY/worker:latest \
                       ./worker

      - name: Build frontend image
        run: |
          docker build -t $REGISTRY/frontend:${{ steps.meta.outputs.sha }} \
                       -t $REGISTRY/frontend:latest \
                       ./frontend

      - name: Push all images
        run: |
          docker push $REGISTRY/api:${{ steps.meta.outputs.sha }}
          docker push $REGISTRY/api:latest
          docker push $REGISTRY/worker:${{ steps.meta.outputs.sha }}
          docker push $REGISTRY/worker:latest
          docker push $REGISTRY/frontend:${{ steps.meta.outputs.sha }}
          docker push $REGISTRY/frontend:latest

  # ────────────────────────────────────────────────────
  # 4. SECURITY SCAN
  # ────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild images for scan (registry restarted in new job)
        run: |
          docker build -t $REGISTRY/api:latest ./api
          docker build -t $REGISTRY/worker:latest ./worker
          docker build -t $REGISTRY/frontend:latest ./frontend

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Scan api image
        run: |
          trivy image --exit-code 1 --severity CRITICAL \
            --format sarif --output trivy-api.sarif \
            $REGISTRY/api:latest

      - name: Scan worker image
        run: |
          trivy image --exit-code 1 --severity CRITICAL \
            --format sarif --output trivy-worker.sarif \
            $REGISTRY/worker:latest

      - name: Scan frontend image
        run: |
          trivy image --exit-code 1 --severity CRITICAL \
            --format sarif --output trivy-frontend.sarif \
            $REGISTRY/frontend:latest

      - name: Upload SARIF results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-results
          path: "*.sarif"

  # ────────────────────────────────────────────────────
  # 5. INTEGRATION TEST
  # ────────────────────────────────────────────────────
  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for compose
        run: |
          echo "REDIS_PASSWORD=ci_test_password" >> .env
          echo "FRONTEND_PORT=3000" >> .env

      - name: Bring stack up
        run: docker compose up -d --build

      - name: Wait for frontend to be healthy
        run: |
          for i in $(seq 1 30); do
            STATUS=$(docker compose ps --format json | python3 -c "
          import sys, json
          services = [json.loads(l) for l in sys.stdin if l.strip()]
          fe = next((s for s in services if 'frontend' in s.get('Service','')), None)
          print(fe.get('Health','') if fe else 'missing')
          ")
            echo "Attempt $i: frontend health = $STATUS"
            [ "$STATUS" = "healthy" ] && break
            sleep 5
          done
          [ "$STATUS" = "healthy" ] || (docker compose logs && exit 1)

      - name: Submit a job and poll until completed
        run: |
          JOB_ID=$(curl -sf -X POST http://localhost:3000/submit | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "Submitted job: $JOB_ID"
          for i in $(seq 1 20); do
            STATUS=$(curl -sf http://localhost:3000/status/$JOB_ID | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
            echo "Poll $i: $STATUS"
            [ "$STATUS" = "completed" ] && break
            sleep 3
          done
          [ "$STATUS" = "completed" ] || (echo "Job did not complete in time" && exit 1)

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  # ────────────────────────────────────────────────────
  # 6. DEPLOY  (main branch only)
  # ────────────────────────────────────────────────────
  deploy:
    name: Rolling Deploy
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via rolling update script
        env:
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

          scp -i ~/.ssh/id_ed25519 docker-compose.yml \
            scripts/rolling-update.sh \
            $DEPLOY_USER@$DEPLOY_HOST:~/app/

          ssh -i ~/.ssh/id_ed25519 $DEPLOY_USER@$DEPLOY_HOST \
            "cd ~/app && bash rolling-update.sh ${GITHUB_SHA::8}"